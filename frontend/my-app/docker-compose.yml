services:
  frontend:
    container_name: marketplace-frontend
    build:
      context: .
      dockerfile: Dockerfile
    image: marketplace-frontend:0.1.0
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      ORIGIN: http://localhost:5173
      BACKEND_BASE_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped