spring:
  application:
    name: marketplace-backend

  profiles:
    default: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  auth:
    jwt-secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
    access-token-ttl: 15m
    refresh-token-ttl: 30d
  storage:
    bucket: ${STORAGE_BUCKET:marketplace-assets}
    download-url-ttl: ${STORAGE_DOWNLOAD_URL_TTL:15m}
    image-url-ttl: ${STORAGE_IMAGE_URL_TTL:1h}