spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: UTC

app:
  cors:
    allowed-origin: http://localhost:5173
  auth:
    jwt-secret: test-secret-for-jwt-signing-test-secret-for-jwt-signing
    access-token-ttl: 15m
    refresh-token-ttl: 30d

management:
  endpoints:
    web:
      exposure:
        include: health,info