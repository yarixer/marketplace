spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: UTC

server:
  shutdown: graceful
  forward-headers-strategy: framework

spring.lifecycle:
  timeout-per-shutdown-phase: 20s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}
  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl: ${ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:30d}
  storage:
    endpoint: ${STORAGE_ENDPOINT}
    access-key: ${STORAGE_ACCESS_KEY}
    secret-key: ${STORAGE_SECRET_KEY}
    bucket: ${STORAGE_BUCKET:marketplace-assets}
    download-url-ttl: ${STORAGE_DOWNLOAD_URL_TTL:15m}
    image-url-ttl: ${STORAGE_IMAGE_URL_TTL:1h}